name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
          terraform_wrapper: false

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - id: plan
        run: terraform plan -no-color -lock=false -input=false -out=tfplan
        continue-on-error: true
        env:
          TF_VAR_amplify_repository_access_token: ${{ secrets.AMPLIFY_REPOSITORY_ACCESS_TOKEN }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: terraform show -no-color tfplan > /tmp/terraform.text
        continue-on-error: true

      - run: terraform show -json tfplan > /tmp/terraform.json
        continue-on-error: true

      - uses: ahmadnassri/action-terraform-report@v4
        with:
          terraform-text: /tmp/terraform.text
          terraform-json: /tmp/terraform.json
          github-token: ${{ github.token }}
          show-diff: true

      - if: steps.plan.outcome == 'failure'
        run: exit 1
