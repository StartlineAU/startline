name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Auth & secrets
        shell: bash
        run: |
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')

          CREDS=$(aws sts assume-role-with-web-identity \
            --region ap-southeast-2 \
            --role-arn "${{ vars.AWS_ROLE_ARN_READONLY }}" \
            --role-session-name "gha-plan" \
            --web-identity-token "$JWT" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)

          for var in \
            "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')" \
            "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')" \
            "AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')" \
            "AWS_DEFAULT_REGION=ap-southeast-2"; do
            echo "$var" >> "$GITHUB_ENV"
            export "$var"
          done

          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/ci-bootstrap \
            --query SecretString --output text)
          export TF_VAR_docs_droplet_ip=$(echo "$BOOTSTRAP" | jq -r '.docs_droplet_ip')
          INFRACOST_API_KEY=$(echo "$BOOTSTRAP" | jq -r '.INFRACOST_API_KEY')
          echo "::add-mask::$TF_VAR_docs_droplet_ip"
          echo "::add-mask::$INFRACOST_API_KEY"
          echo "TF_VAR_docs_droplet_ip=$TF_VAR_docs_droplet_ip" >> "$GITHUB_ENV"
          echo "INFRACOST_API_KEY=$INFRACOST_API_KEY" >> "$GITHUB_ENV"

      - name: Install Terraform
        shell: bash
        run: |
          curl -sLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
          unzip -qo /tmp/terraform.zip -d /usr/local/bin
          terraform version

      - name: Install Infracost
        shell: bash
        run: |
          curl -sL "https://github.com/infracost/infracost/releases/download/v0.10.45/infracost-linux-amd64.tar.gz" -o /tmp/infracost.tar.gz
          tar -xzf /tmp/infracost.tar.gz -C /tmp
          mv /tmp/infracost-linux-amd64 /usr/local/bin/infracost
          infracost configure set api_key $INFRACOST_API_KEY

      # --- Baseline on base branch ---
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Generate Infracost baseline
        shell: bash
        run: |
          terraform init -input=false || true
          terraform plan -out=/tmp/base.tfplan -no-color -lock=false -input=false || true
          if [ -f /tmp/base.tfplan ]; then
            terraform show -json /tmp/base.tfplan > /tmp/plan-base.json
            infracost breakdown --path /tmp/plan-base.json --format json --out-file /tmp/infracost-base.json || true
          fi

      # --- PR branch ---
      - uses: actions/checkout@v5

      - name: Terraform plan
        shell: bash
        run: |
          terraform init -input=false
          terraform validate -no-tests
          terraform plan -out=/tmp/pr.tfplan -no-color -lock=false -input=false 2>&1 | tee /tmp/plan-output.txt || true

      - name: Generate Infracost diff
        shell: bash
        run: |
          if [ -f /tmp/pr.tfplan ]; then
            terraform show -json /tmp/pr.tfplan > /tmp/plan-pr.json 2>&1 || true
            infracost diff --path /tmp/plan-pr.json --compare-to /tmp/infracost-base.json --format json --out-file /tmp/infracost-diff.json 2>&1 || echo "infracost diff failed (non-blocking)"
          else
            echo "No plan file found, skipping Infracost diff" > /tmp/plan-output.txt
          fi

      - name: Post PR comment
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="/tmp/pr-comment.md"
          echo "## Terraform Plan" > "$BODY"

          PLAN=$(cat /tmp/plan-output.txt 2>/dev/null || echo "No plan output available")
          MAX_LEN=50000
          if [ ${#PLAN} -gt $MAX_LEN ]; then
            PLAN="${PLAN:0:$MAX_LEN}"$'\n'"... (truncated, see workflow logs for full output)"
          fi

          {
            echo ""
            echo "<details><summary>Plan Output</summary>"
            echo ""
            echo '```'
            echo "$PLAN"
            echo '```'
            echo "</details>"
          } >> "$BODY"

          if [ -s /tmp/infracost-diff.json ]; then
            echo "" >> "$BODY"
            echo "## Infracost" >> "$BODY"
            echo "" >> "$BODY"
            infracost comment github --path /tmp/infracost-diff.json --dry-run 2>&1 | head -c 30000 >> "$BODY"
          fi

          jq -Rs '{body: .}' < "$BODY" > /tmp/comment-payload.json 2>/dev/null
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .id' 2>/dev/null | \
            while read id; do
              gh api -X DELETE "/repos/${{ github.repository }}/issues/comments/$id" --silent 2>/dev/null || true
            done
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --input /tmp/comment-payload.json 2>/dev/null || true
