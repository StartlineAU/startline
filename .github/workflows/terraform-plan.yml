name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Get OIDC credentials
        run: |
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "gha-plan" \
            --web-identity-token "$JWT" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text 2>/dev/null) && (
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')" >> "$GITHUB_ENV"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')" >> "$GITHUB_ENV"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')" >> "$GITHUB_ENV"
          )

      - run: |
          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/tf-bootstrap \
            --query SecretString --output text)
          echo "$BOOTSTRAP" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

          APP=$(aws secretsmanager get-secret-value \
            --secret-id startline/nonprod/app \
            --query SecretString --output text)
          echo "$APP" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - run: aws sts get-caller-identity --output text

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - id: plan
        run: terraform plan -no-color -lock=false -input=false -out=tfplan
        continue-on-error: true

      - uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN_STDOUT;
            const summary = plan.match(/Plan:.*?(?:\d.*?)?(?:to add|to change|to destroy|No changes).*/)?.[0]?.trim()
              ?? "See full plan below.";
            const body = `<details><summary>${summary}</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - if: steps.plan.outcome == 'failure'
        run: exit 1
