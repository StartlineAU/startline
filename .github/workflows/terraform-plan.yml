name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Assume AWS role via OIDC
        run: |
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | jq -r '.value' > /tmp/aws-web-identity-token
          echo "AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/aws-web-identity-token" >> "$GITHUB_ENV"
          echo "AWS_ROLE_ARN=${{ vars.AWS_ROLE_ARN }}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=ap-southeast-2" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=" >> "$GITHUB_ENV"

      - run: |
          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/tf-bootstrap \
            --query SecretString --output text)
          echo "$BOOTSTRAP" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

          APP=$(aws secretsmanager get-secret-value \
            --secret-id startline/nonprod/app \
            --query SecretString --output text)
          echo "$APP" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - id: plan
        run: terraform plan -no-color -lock=false -input=false -out=tfplan
        continue-on-error: true

      - uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN_STDOUT;
            const summary = plan.match(/Plan:.*?(?:\d.*?)?(?:to add|to change|to destroy|No changes).*/)?.[0]?.trim()
              ?? "See full plan below.";
            const body = `<details><summary>${summary}</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - if: steps.plan.outcome == 'failure'
        run: exit 1
