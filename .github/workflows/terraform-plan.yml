name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: ./.github/actions/load-env
        with:
          environment: nonprod

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.10.0'

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - id: plan
        run: terraform plan -no-color -lock=false -input=false -out=tfplan
        continue-on-error: true

      - uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN_STDOUT;
            const summary = plan.match(/Plan:.*?(?:\d.*?)?(?:to add|to change|to destroy|No changes).*/)?.[0]?.trim()
              ?? "See full plan below.";
            const body = `<details><summary>${summary}</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - if: steps.plan.outcome == 'failure'
        run: exit 1
