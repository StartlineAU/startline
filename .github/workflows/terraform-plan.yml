name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Auth and load env
        run: |
          # Fetch OIDC token from GitHub
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')

          # Assume role using web identity
          CREDS=$(aws sts assume-role-with-web-identity \
            --region ap-southeast-2 \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "gha-plan" \
            --web-identity-token "$JWT" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)

          AK=$(echo "$CREDS" | awk '{print $1}')
          SK=$(echo "$CREDS" | awk '{print $2}')
          ST=$(echo "$CREDS" | awk '{print $3}')

          # Export to GITHUB_ENV for subsequent steps
          echo "AWS_ACCESS_KEY_ID=$AK" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SK" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$ST" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=ap-southeast-2" >> "$GITHUB_ENV"

          # Also write credentials file for Terraform
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = $AK
          aws_secret_access_key = $SK
          aws_session_token = $ST
          EOF
          cat > ~/.aws/config << EOF
          [default]
          region = ap-southeast-2
          EOF

          # Verify
          aws sts get-caller-identity --output text

          # Fetch bootstrap secrets (uses the credentials we just set)
          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/tf-bootstrap \
            --query SecretString --output text)
          echo "$BOOTSTRAP" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

          APP=$(aws secretsmanager get-secret-value \
            --secret-id startline/nonprod/app \
            --query SecretString --output text)
          echo "$APP" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - run: |
          terraform init -input=false
          terraform validate -no-tests
          terraform plan -no-color -lock=false -input=false
