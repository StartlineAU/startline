name: Terraform plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Terraform plan
        shell: bash
        run: |
          # Install terraform
          curl -sLo terraform.zip https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
          unzip -q terraform.zip -d /tmp/terraform-bin
          export PATH="/tmp/terraform-bin:$PATH"

          # Auth via OIDC
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')

          CREDS=$(aws sts assume-role-with-web-identity \
            --region ap-southeast-2 \
            --role-arn "${{ vars.AWS_ROLE_ARN_READONLY }}" \
            --role-session-name "gha-plan" \
            --web-identity-token "$JWT" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)

          AK=$(echo "$CREDS" | awk '{print $1}')
          SK=$(echo "$CREDS" | awk '{print $2}')
          ST=$(echo "$CREDS" | awk '{print $3}')

          export AWS_ACCESS_KEY_ID=$AK
          export AWS_SECRET_ACCESS_KEY=$SK
          export AWS_SESSION_TOKEN=$ST
          export AWS_DEFAULT_REGION=ap-southeast-2

          # Fetch CI/CD bootstrap secrets
          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/ci-bootstrap \
            --query SecretString --output text)

          # Export terraform input variables from bootstrap
          export TF_VAR_docs_droplet_ip=$(echo "$BOOTSTRAP" | jq -r '.docs_droplet_ip')

          # Terraform
          terraform init -input=false
          terraform validate -no-tests
          terraform plan -no-color -lock=false -input=false
