name: Cleanup Neon branch
on:
  pull_request:
    types: [closed]
permissions:
  id-token: write
  contents: read
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/load-env
        with:
          aws-role-arn: ${{ vars.AWS_ROLE_ARN_READONLY }}
          environment: prod
      - name: Delete Neon branch
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: bash scripts/teardown-preview-db.sh
