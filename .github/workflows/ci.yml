name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Set GITLEAKS_LICENSE (fallback to GitHub secret until AWS SM populated)
        run: |
          echo "GITLEAKS_LICENSE=${{ secrets.GITLEAKS_LICENSE }}" >> $GITHUB_ENV
          LICENSE=$(aws secretsmanager get-secret-value \
            --secret-id startline/ci/secrets \
            --query SecretString --output text 2>/dev/null \
            | jq -r '.GITLEAKS_LICENSE // empty') \
          && [ -n "$LICENSE" ] && echo "GITLEAKS_LICENSE=$LICENSE" >> $GITHUB_ENV \
          || echo "AWS SM not available yet, using GitHub secret"
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}

  lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: startline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/startline?schema=public
      NEXT_PUBLIC_AWS_REGION: ap-southeast-2
      NEXT_PUBLIC_SITE_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Set base env vars from repo vars
        run: |
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ vars.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}" >> $GITHUB_ENV
      - name: Override with AWS Secrets Manager (if available — single source of truth)
        continue-on-error: true
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id startline/ci/secrets \
            --query SecretString --output text) \
          && echo "$SECRET" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> $GITHUB_ENV \
          || echo "Secret not found yet — will be created by Terraform after merge"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - name: Start Next.js dev server
        run: |
          pnpm dev -p 3002 &
          npx wait-on http://localhost:3002/admin/login --timeout 60000
      - run: pnpm test:e2e
