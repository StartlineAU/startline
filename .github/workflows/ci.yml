name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Assume AWS role via OIDC
        run: |
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "gha-gitleaks" \
            --web-identity-token "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')" >> "$GITHUB_ENV"
      - uses: ./.github/actions/load-env
        with:
          environment: nonprod
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/startline?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm approve-builds --all
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/startline?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm approve-builds --all
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm test

  e2e:
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: startline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Assume AWS role via OIDC
        run: |
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "gha-e2e" \
            --web-identity-token "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')" >> "$GITHUB_ENV"
      - uses: ./.github/actions/load-env
        with:
          environment: nonprod
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm approve-builds --all
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - name: Start Next.js dev server
        run: |
          pnpm dev -p 3000 &
          npx wait-on http://localhost:3000/admin/login --timeout 60000
      - run: pnpm test:e2e
