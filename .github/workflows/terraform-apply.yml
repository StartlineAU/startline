name: Terraform apply

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'
      - '.github/actions/load-env/**'

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/load-env
        with:
          aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
          environment: nonprod

      - name: Install Terraform
        shell: bash
        run: |
          curl -sLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
          unzip -qo /tmp/terraform.zip -d /usr/local/bin

      - name: Terraform apply
        shell: bash
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Start deployment
        id: tf-deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'non-production',
              description: 'Terraform apply (${{ github.sha }})',
              auto_merge: false,
            })
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
            })
            core.setOutput('deployment_id', deployment.data.id)
            core.setOutput('env', deployment.data.environment)

      - name: Finish deployment
        if: always() && steps.tf-deployment.outputs.deployment_id != ''
        uses: actions/github-script@v9
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt('${{ steps.tf-deployment.outputs.deployment_id }}'),
              state: state,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            })
