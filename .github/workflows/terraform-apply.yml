name: Terraform apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Terraform apply
        shell: bash
        run: |
          # Install terraform
          curl -sLo terraform.zip https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
          unzip -q terraform.zip -d /tmp/terraform-bin
          export PATH="/tmp/terraform-bin:$PATH"

          # Auth via OIDC
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')

          CREDS=$(aws sts assume-role-with-web-identity \
            --region ap-southeast-2 \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "gha-apply" \
            --web-identity-token "$JWT" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)

          export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')
          export AWS_DEFAULT_REGION=ap-southeast-2

          # Fetch bootstrap + app secrets
          BOOTSTRAP=$(aws secretsmanager get-secret-value \
            --secret-id startline/tf-bootstrap \
            --query SecretString --output text)
          echo "$BOOTSTRAP" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

          APP=$(aws secretsmanager get-secret-value \
            --secret-id startline/nonprod/app \
            --query SecretString --output text)
          echo "$APP" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

          # Terraform
          terraform init -input=false
          terraform apply -auto-approve -input=false
