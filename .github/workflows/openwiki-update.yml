name: OpenWiki Update

on:
  workflow_dispatch:
  pull_request:
    branches: [main, prod]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki code --update --print
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_BASE_URL: https://opencode.ai/zen/go/v1
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENWIKI_MODEL_ID: deepseek-v4-flash

      - name: Commit docs changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openwiki AGENTS.md
          if git diff --cached --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m "docs: update OpenWiki"
            git push
          fi
